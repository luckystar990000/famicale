name = "famicale-api"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# D1 database
# 作成コマンド: wrangler d1 create famicale-db
# 作成後に database_id を書き換えてください
[[d1_databases]]
binding = "DB"
database_name = "famicale-db"
database_id = "29fa1ee6-14fc-4bae-bd49-0cb5e022385e"

# R2 bucket
# 作成コマンド: wrangler r2 bucket create famicale-images
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "famicale-images"

# Workers AI (OCR で使用、 認証は wrangler login の OAuth、 個別 API キー不要)
# remote = true で local dev でも remote 実行 (Workers AI はそもそも remote 専用なので警告抑止)
[ai]
binding = "AI"
remote = true

# 前日通知: 毎日 20:00 JST (= 11:00 UTC) に scheduled ハンドラを起動
[triggers]
crons = ["0 11 * * *"]
