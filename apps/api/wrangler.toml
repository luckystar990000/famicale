name = "famicale-api"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# D1 database
# 作成コマンド: wrangler d1 create famicale-db
# 作成後に database_id を書き換えてください
[[d1_databases]]
binding = "DB"
database_name = "famicale-db"
database_id = "REPLACE_WITH_YOUR_D1_DATABASE_ID"

# R2 bucket
# 作成コマンド: wrangler r2 bucket create famicale-images
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "famicale-images"

# Workers AI
[ai]
binding = "AI"

# 環境変数 (シークレット)
# 設定コマンド: wrangler secret put ANTHROPIC_API_KEY
# [vars]
# ANTHROPIC_API_KEY = ""  # wrangler secret で設定すること
